<p>The US ETF Constituents is a universe-selection dataset that is downloaded in bulk, not by individual ticker. To download it, see <a href="/docs/v2/lean-cli/datasets/quantconnect/us-etf-constituents#03-Download-in-Bulk">Download in Bulk</a>.</p>

<p>To download data interactively or to use the CLI Command Generator, see <a href="/docs/v2/lean-cli/datasets/quantconnect/key-concepts#03-Using-the-CLI">Using the CLI</a>.</p>
