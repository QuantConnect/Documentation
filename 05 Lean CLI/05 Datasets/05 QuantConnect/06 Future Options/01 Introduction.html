<p>Download the <a href='https://www.quantconnect.com/docs/v2/writing-algorithms/datasets/algoseek/us-future-options'>US Future Options dataset</a> to your local machine. You can download the full dataset in bulk to avoid selection bias. The dataset contains trade, quote, and open interest data for every ticker and trading day.</p>

<p>To use the CLI, you must be a member in an <a href='https://www.quantconnect.com/docs/v2/cloud-platform/organizations/tier-features'>organization</a> on a paid tier.</p>
