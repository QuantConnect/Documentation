<p>Access to the US Future Options dataset is by contact only, so there is no by-ticker download command. To request access, <a href="https://www.quantconnect.com/contact">contact us</a>. After you have access, download the data in bulk; see <a href="/docs/v2/lean-cli/datasets/quantconnect/future-options#03-Download-in-Bulk">Download in Bulk</a>.</p>
