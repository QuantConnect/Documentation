<p>Follow these steps to update a task in your organization:</p>
<ol>
  <li>Log in to the <a href="/terminal">Algorithm Lab</a>.</li>
  <li>In the left navigation bar, click <span class="page-section-name">Organization &gt; Assistants</span>.</li>
  <li>Click the <span class="tab-name">Tasks</span> tab.</li>
  <li>Click a task.</li>
  <li>Click the <img class="inline-icon" src="https://cdn.quantconnect.com/i/tu/edit-task-icon.png"> <span class="icon-name">Edit Task</span> icon.</li>
  <li>Edit the task configuration.</li>
  <li>Click <span class="button-name">Save Changes</span>.</li>
</ol>
