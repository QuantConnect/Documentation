<p>Follow these steps to add a task to your organization:</p>
<ol>
  <li>Log in to the <a href="/terminal">Algorithm Lab</a>.</li>
  <li>In the left navigation bar, click <span class="page-section-name">Organization &gt; Assistants</span>.</li>
  <li>Click the <span class="tab-name">Tasks</span> tab.</li>
  <li>Click <span class="button-name">Add Task</span>.</li>
  <li>Fill out the <span class="page-section-name">Task Configuration</span> form.</li>
  <li>Click <span class="button-name">Create Task</span>.</li>
</ol>
