<p>Follow these steps to delete a deployment:</p>
<ol>
  <li>Log in to the <a href="/terminal">Algorithm Lab</a>.</li>
  <li>In the left navigation bar, click <span class="page-section-name">Organization &gt; Assistants</span>.</li>
  <li>Click the <span class="tab-name">Tasks</span> tab.</li>
  <li>Click a task.</li>
  <li>In the row of the deployment you want to remove, click <span class="button-name">Delete</span>.</li>
  <li>Click <span class="button-name">Delete</span> again to confirm.</li>
</ol>
