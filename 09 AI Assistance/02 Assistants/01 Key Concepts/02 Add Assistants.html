<p>Follow these steps to add Assistants to your organization:</p>
<ol>
  <li>Log in to the <a href="/terminal">Algorithm Lab</a>.</li>
  <li>In the left navigation bar, click <span class="page-section-name">Organization &gt; Assistants</span>.</li>
  <li>Click <span class="button-name">Add Assistant</span>.</li>
  <li>Fill out the <span class="page-section-name">New Assistant</span> form.</li>
  <li>Click <span class="button-name">Create Assistant</span>.</li>
</ol>
