<p>Follow these steps to delete an Assistant in your organization:</p>
<ol>
  <li>Log in to the <a href="/terminal">Algorithm Lab</a>.</li>
  <li>In the left navigation bar, click <span class="page-section-name">Organization &gt; Assistants</span>.</li>
  <li>In the row of the Assistant that you want to remove, click <span class="button-name">Delete</span>.</li>
</ol>
