name: Upload Skills to S3

on:
  push:
    paths:
      - '**/SKILL.md'
  workflow_dispatch:  # Run on manual trigger

jobs:
  upload_skills:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bundle Skills
        # Validate and bundle all SKILL.md files into a single zip for upload.
        # The script lives in `skill-templates/` and writes `skills.zip` at the repo root.
        run: python3 skill-templates/bundle-skills.py

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: us-west-1

      - name: Upload skills to S3
        run: aws s3 cp skills.zip s3://cdn.quantconnect.com/skills/skills-latest.zip --acl bucket-owner-full-control
