<p>Follow these steps to update the title or body of a card on the Research Pipeline:</p>
<ol>
  <li>
    Click on a card.
    <p>The <span class="tab-name">Card</span> tab shows the current title and description.</p>
    <img src="https://cdn.quantconnect.com/i/tu/research-pipeline-view-card.png" class="docs-image" style="border: 2px solid #e4e6ea;" alt="Card tab showing the current title and description."/>
  </li>
  <li>Click <span class="button-name">Edit Idea</span>.</li>
  <li>Enter the new title and description.</li>
  <li>Click <span class="button-name">Save</span>.</li>
</ol>
